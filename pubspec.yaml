name: ashu
description: "ASHU – Advanced Streaming Hub for Users"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4
  just_audio: ^0.9.40
  just_audio_web: ^0.4.9
  audio_service: ^0.18.13
  supabase_flutter: ^2.5.6
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3
  go_router: ^14.2.7
  cached_network_image: ^3.3.1
  palette_generator: ^0.3.3+3
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  url_launcher: ^6.3.0
  qr_flutter: ^4.1.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  dartz: ^0.10.1
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
